<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attack Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --dim: #8b949e;
            --green: #3fb950;
            --red: #f85149;
            --blue: #58a6ff;
            --yellow: #d29922;
            --orange: #f0883e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 980px; margin: 0 auto; padding: 28px 20px; }

        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text); }
        .badge {
            padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            background: #1c2128; border: 1px solid var(--border);
            color: var(--dim); transition: all 0.3s;
        }
        .badge.attack { background: rgba(248,81,73,0.15); border-color: var(--red); color: var(--red); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

        /* Target box */
        .target-box {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px 24px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
        }
        .target-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .target-value { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700; color: var(--blue); }
        .target-sub { font-size: 13px; color: var(--dim); margin-top: 4px; }
        .copy-btn {
            background: var(--blue); color: #0d1117; border: none; padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; white-space: nowrap;
        }
        .copy-btn:hover { opacity: 0.85; }

        /* Metrics grid */
        .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 16px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 16px; }
        @media(max-width:700px){ .grid-4{grid-template-columns:repeat(2,1fr)} .grid-3{grid-template-columns:repeat(2,1fr)} }

        .metric {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px 16px; text-align: center;
        }
        .metric.blue   { border-top: 3px solid var(--blue); }
        .metric.green  { border-top: 3px solid var(--green); }
        .metric.red    { border-top: 3px solid var(--red); }
        .metric.yellow { border-top: 3px solid var(--yellow); }
        .metric.orange { border-top: 3px solid var(--orange); }
        .metric-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 30px; font-weight: 700; line-height: 1; margin-bottom: 6px;
        }
        .metric-unit { font-size: 13px; font-weight: 400; opacity: 0.65; }
        .metric-lbl { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .peak { font-size: 11px; color: var(--dim); margin-top: 4px; }

        /* Graph */
        .graph-box {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 16px;
        }
        .graph-box h3 { font-size: 11px; color: var(--dim); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }
        canvas { width: 100%; height: 90px; display: block; }

        /* Top IPs */
        .ips-box {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 16px;
        }
        .ips-box h3 { font-size: 11px; color: var(--dim); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .ip-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; background: var(--bg); border-radius: 6px; margin-bottom: 6px;
            font-family: 'JetBrains Mono', monospace; font-size: 13px;
        }
        .ip-bar-wrap { flex: 1; margin: 0 14px; background: #21262d; border-radius: 4px; height: 6px; overflow: hidden; }
        .ip-bar { height: 100%; background: var(--blue); border-radius: 4px; transition: width 0.4s; }
        .ip-count { color: var(--yellow); font-weight: 700; white-space: nowrap; }

        /* Log */
        .log-box {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px;
        }
        .log-box h3 { font-size: 11px; color: var(--dim); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }
        #logEntries { max-height: 220px; overflow-y: auto; }
        .log-entry {
            display: flex; justify-content: space-between; gap: 12px;
            padding: 8px 12px; background: var(--bg); border-radius: 6px;
            margin-bottom: 5px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
            border-left: 3px solid var(--green);
        }
        .log-entry.alert { border-left-color: var(--red); }
        .log-entry.warn  { border-left-color: var(--yellow); }
        .log-time { color: var(--dim); white-space: nowrap; flex-shrink: 0; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>🎯 Attack Monitor</h1>
        <div class="badge" id="statusBadge">STANDBY</div>
    </div>

    <!-- Target info -->
    <div class="target-box">
        <div>
            <div class="target-label">Tu servidor — ataca esta IP</div>
            <div class="target-value" id="targetDisplay">cargando...</div>
            <div class="target-sub" id="targetSub">Uptime: 00:00:00</div>
        </div>
        <button class="copy-btn" onclick="copyIp()">📋 Copiar IP</button>
    </div>

    <!-- Métricas principales -->
    <div class="grid-4">
        <div class="metric red">
            <div class="metric-val" id="rps">0 <span class="metric-unit">req/s</span></div>
            <div class="metric-lbl">Requests/seg</div>
            <div class="peak" id="peakRps">Pico: 0</div>
        </div>
        <div class="metric blue">
            <div class="metric-val" id="gbps">0.0000 <span class="metric-unit">Gbps</span></div>
            <div class="metric-lbl">Ancho de banda</div>
            <div class="peak" id="peakGbps">Pico: 0.0000</div>
        </div>
        <div class="metric orange">
            <div class="metric-val" id="uniqueIps">0</div>
            <div class="metric-lbl">IPs únicas</div>
        </div>
        <div class="metric green">
            <div class="metric-val" id="totalReq">0</div>
            <div class="metric-lbl">Total requests</div>
        </div>
    </div>

    <!-- Gráfico RPS -->
    <div class="graph-box">
        <h3>Requests por segundo — últimos 60s</h3>
        <canvas id="rpsCanvas"></canvas>
    </div>

    <!-- Top IPs -->
    <div class="ips-box">
        <h3>Top IPs atacantes</h3>
        <div id="topIpsList"><div style="color:var(--dim);font-size:13px">Sin tráfico aún...</div></div>
    </div>

    <!-- Log -->
    <div class="log-box">
        <h3>Registro de eventos</h3>
        <div id="logEntries"></div>
    </div>

</div>

<script>
    let ws;
    let lastRps = 0;
    let wasUnderAttack = false;
    let publicIp = '';

    function addLog(msg, type = 'normal') {
        const div = document.createElement('div');
        div.className = 'log-entry' + (type === 'alert' ? ' alert' : type === 'warn' ? ' warn' : '');
        div.innerHTML = `<span>${msg}</span><span class="log-time">${new Date().toLocaleTimeString()}</span>`;
        const c = document.getElementById('logEntries');
        c.insertBefore(div, c.firstChild);
        if (c.children.length > 40) c.removeChild(c.lastChild);
    }

    function copyIp() {
        if (!publicIp) return;
        navigator.clipboard.writeText(publicIp).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.textContent = '✓ Copiado';
            setTimeout(() => btn.textContent = '📋 Copiar IP', 1500);
        });
    }

    function drawRpsGraph(history) {
        const canvas = document.getElementById('rpsCanvas');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width  = rect.width * dpr;
        canvas.height = 90 * dpr;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);

        const w = rect.width, h = 90;
        ctx.clearRect(0, 0, w, h);

        if (!history || history.length < 2) return;

        const maxRps = Math.max(...history.map(p => p.rps), 10);
        const barW = w / 60;

        // Rellenar con vacíos si hay menos de 60
        const padded = Array(60 - history.length).fill({ rps: 0 }).concat(history);

        padded.forEach((p, i) => {
            const x = i * barW;
            const barH = Math.max(2, (p.rps / maxRps) * (h - 6));
            const pct = p.rps / maxRps;
            // Verde → amarillo → rojo según intensidad
            const r = Math.round(63  + pct * (248 - 63));
            const g = Math.round(185 + pct * (81  - 185));
            const b = Math.round(80  + pct * (73  - 80));
            ctx.fillStyle = `rgba(${r},${g},${b},0.85)`;
            ctx.fillRect(x, h - barH, Math.max(barW - 1, 1), barH);
        });
    }

    function renderTopIps(topIps) {
        const el = document.getElementById('topIpsList');
        if (!topIps || topIps.length === 0) {
            el.innerHTML = '<div style="color:var(--dim);font-size:13px">Sin tráfico aún...</div>';
            return;
        }
        const max = topIps[0].count || 1;
        el.innerHTML = topIps.map(({ ip, count }) => `
            <div class="ip-row">
                <span>${ip}</span>
                <div class="ip-bar-wrap"><div class="ip-bar" style="width:${(count/max*100).toFixed(1)}%"></div></div>
                <span class="ip-count">${count.toLocaleString()} req</span>
            </div>
        `).join('');
    }

    function updateUI(data) {
        // Target display
        if (data.publicIp && data.publicIp !== '...') {
            publicIp = data.publicIp;
            document.getElementById('targetDisplay').textContent = `${data.publicIp}:443`;
            document.getElementById('targetSub').textContent =
                `Uptime: ${data.uptimeFormatted} · Puerto HTTP: ${data.port}`;
        }

        // Badge de ataque
        const badge = document.getElementById('statusBadge');
        if (data.underAttack) {
            badge.className = 'badge attack';
            badge.textContent = '⚠ BAJO ATAQUE';
        } else {
            badge.className = 'badge';
            badge.textContent = 'STANDBY';
        }

        // Logs de eventos
        if (data.underAttack && !wasUnderAttack) {
            addLog(`🔴 ATAQUE INICIADO — ${data.currentRps} req/s`, 'alert');
        }
        if (!data.underAttack && wasUnderAttack) {
            addLog('🟢 Tráfico normalizado', 'normal');
        }
        wasUnderAttack = data.underAttack;

        if (data.currentRps > 0 && lastRps === 0) {
            addLog(`Tráfico detectado: ${data.currentRps} req/s`, 'warn');
        }
        lastRps = data.currentRps;

        // Métricas
        document.getElementById('rps').innerHTML =
            `${data.currentRps.toLocaleString()} <span class="metric-unit">req/s</span>`;
        document.getElementById('peakRps').textContent = `Pico: ${data.peakRps.toLocaleString()}`;

        document.getElementById('gbps').innerHTML =
            `${data.gbps.toFixed(4)} <span class="metric-unit">Gbps</span>`;
        document.getElementById('peakGbps').textContent = `Pico: ${data.peakGbps.toFixed(4)}`;

        document.getElementById('uniqueIps').textContent = data.uniqueIps.toLocaleString();
        document.getElementById('totalReq').textContent  = data.totalRequests.toLocaleString();

        // Gráfico
        drawRpsGraph(data.rpsHistory);

        // Top IPs
        renderTopIps(data.topIps);
    }

    function connect() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${proto}//${location.host}`);
        ws.onopen    = () => addLog('Monitor conectado y activo');
        ws.onclose   = () => { addLog('Reconectando...', 'warn'); setTimeout(connect, 3000); };
        ws.onmessage = (e) => updateUI(JSON.parse(e.data));
    }

    connect();
</script>
</body>
</html>
